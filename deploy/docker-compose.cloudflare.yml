services:
  caddy:
    volumes:
      - ./Caddyfile.cloudflare:/etc/caddy/Caddyfile:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: [tunnel, --no-autoupdate, run, --token-file, /run/secrets/cloudflare_tunnel_token]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    secrets: [cloudflare_tunnel_token]
    networks:
      edge:
        ipv4_address: 172.30.0.40
    depends_on:
      caddy: { condition: service_started }

secrets:
  cloudflare_tunnel_token:
    file: ${CLOUDFLARE_TUNNEL_TOKEN_FILE:-./secrets/cloudflare_tunnel_token}
