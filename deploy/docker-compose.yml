name: saltedblog

x-hardened: &hardened
  restart: unless-stopped
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  pids_limit: 256
  mem_limit: 1g
  cpus: 2.0

services:
  caddy:
    <<: *hardened
    image: ghcr.io/salteddoubao/saltedblog-caddy:${SALTEDBLOG_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:?set ADMIN_DOMAIN}
      ADMIN_ALLOWED_CIDRS: ${ADMIN_ALLOWED_CIDRS:?set ADMIN_ALLOWED_CIDRS}
      UPSTREAM_PROXY_CIDRS: ${UPSTREAM_PROXY_CIDRS:-127.0.0.1/32}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    tmpfs: [/tmp]
    networks:
      edge:
        ipv4_address: 172.30.0.10
    depends_on:
      web: { condition: service_healthy }
      api: { condition: service_healthy }

  web:
    <<: *hardened
    image: ghcr.io/salteddoubao/saltedblog-web:${SALTEDBLOG_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    environment:
      API_URL: http://api:8787
      PUBLIC_SITE_URL: https://${SITE_DOMAIN}
      PORT: "4321"
    tmpfs:
      - /tmp
      - /app/.astro:uid=1000,gid=1000
    networks:
      edge:
        ipv4_address: 172.30.0.20
    healthcheck:
      test: [CMD, wget, -q, -O, /dev/null, http://127.0.0.1:4321/]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      api: { condition: service_healthy }

  api:
    <<: *hardened
    image: ghcr.io/salteddoubao/saltedblog-api:${SALTEDBLOG_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      APP_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_MAINTENANCE_URL_FILE: /run/secrets/database_maintenance_url
      BIND_ADDR: 0.0.0.0:8787
      UPLOAD_DIR: /data/uploads
      BACKUP_DIR: /data/backups
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
      BACKUP_UPLOAD_MAX_MB: ${BACKUP_UPLOAD_MAX_MB:-1024}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-20}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-30}
      SESSION_ABSOLUTE_HOURS: ${SESSION_ABSOLUTE_HOURS:-12}
      STEP_UP_MINUTES: ${STEP_UP_MINUTES:-5}
      COOKIE_SECURE: "true"
      ADMIN_ORIGIN: https://${ADMIN_DOMAIN}
      TRUSTED_PROXY_CIDRS: 172.30.0.10/32
      MFA_REQUIRED: "true"
      MFA_ENCRYPTION_KEY_FILE: /run/secrets/mfa_encryption_key
      BACKUP_SIGNING_KEY_FILE: /run/secrets/backup_signing_key
      STATS_TZ_OFFSET_HOURS: ${STATS_TZ_OFFSET_HOURS:-8}
      NEWS_LLM_API_KEY_FILE: /run/secrets/news_llm_api_key
      RUST_LOG: info,sqlx=warn
    secrets: [database_url, database_maintenance_url, mfa_encryption_key, backup_signing_key, news_llm_api_key]
    volumes:
      - app_data:/data
    tmpfs: [/tmp]
    networks:
      edge:
        ipv4_address: 172.30.0.30
      data:
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, curl, -fsS, http://127.0.0.1:8787/healthz]
      interval: 30s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/salteddoubao/saltedblog-api:${SALTEDBLOG_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: [salted-api, migrate]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      APP_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_MAINTENANCE_URL_FILE: /run/secrets/database_maintenance_url
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      MFA_REQUIRED: "true"
      COOKIE_SECURE: "true"
      ADMIN_ORIGIN: https://${ADMIN_DOMAIN}
      MFA_ENCRYPTION_KEY_FILE: /run/secrets/mfa_encryption_key
      BACKUP_SIGNING_KEY_FILE: /run/secrets/backup_signing_key
    secrets: [database_url, database_maintenance_url, admin_password, mfa_encryption_key, backup_signing_key]
    tmpfs: [/tmp]
    networks: [data]
    depends_on:
      db-init: { condition: service_completed_successfully }

  db-init:
    image: postgres:17.5-alpine
    restart: "no"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      POSTGRES_SUPERUSER: ${POSTGRES_SUPERUSER:-salted_admin}
      POSTGRES_DB: ${POSTGRES_DB:-saltedblog}
    secrets: [postgres_superuser_password, postgres_owner_password, postgres_app_password]
    volumes: [./init-db.sh:/init-db.sh:ro]
    command: [sh, /init-db.sh]
    tmpfs: [/tmp]
    networks: [data]
    depends_on:
      postgres: { condition: service_healthy }

  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-salted_admin}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_DB: ${POSTGRES_DB:-saltedblog}
    secrets: [postgres_superuser_password]
    volumes: [pg_data:/var/lib/postgresql/data]
    networks: [data]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  edge:
    ipam:
      config: [{ subnet: 172.30.0.0/24 }]
  data:
    internal: true
    ipam:
      config: [{ subnet: 172.31.0.0/24 }]

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
  pg_data:
  app_data:

secrets:
  database_url:
    file: ${DATABASE_URL_SECRET_FILE:-./secrets/database_url}
  database_maintenance_url:
    file: ${DATABASE_MAINTENANCE_URL_SECRET_FILE:-./secrets/database_maintenance_url}
  postgres_superuser_password:
    file: ${POSTGRES_SUPERUSER_PASSWORD_FILE:-./secrets/postgres_superuser_password}
  postgres_owner_password:
    file: ${POSTGRES_OWNER_PASSWORD_FILE:-./secrets/postgres_owner_password}
  postgres_app_password:
    file: ${POSTGRES_APP_PASSWORD_FILE:-./secrets/postgres_app_password}
  admin_password:
    file: ${ADMIN_PASSWORD_FILE:-./secrets/admin_password}
  mfa_encryption_key:
    file: ${MFA_ENCRYPTION_KEY_FILE:-./secrets/mfa_encryption_key}
  backup_signing_key:
    file: ${BACKUP_SIGNING_KEY_FILE:-./secrets/backup_signing_key}
  news_llm_api_key:
    file: ${NEWS_LLM_API_KEY_FILE:-./secrets/news_llm_api_key}
