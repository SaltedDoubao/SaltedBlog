name: release-preflight

on:
  push:
    branches: [main]
    paths:
      - VERSION

permissions:
  contents: read

concurrency:
  group: release-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Run shared release gate
        shell: bash
        run: |
          args=(--skip-images)
          if ! git cat-file -e "${{ github.event.before }}:VERSION" 2>/dev/null; then
            args+=(--bootstrap)
          fi
          python .codex/skills/release-preflight/scripts/release_preflight.py "${args[@]}"

  images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: deploy/Dockerfile.api
          - image: web
            dockerfile: deploy/Dockerfile.web
          - image: caddy
            dockerfile: deploy/Dockerfile.caddy
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          pull: true
          push: false
          load: ${{ matrix.image == 'api' }}
          tags: saltedblog-preflight:${{ matrix.image }}
          cache-from: type=gha,scope=preflight-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=preflight-${{ matrix.image }}
      - name: Verify API runtime libraries
        if: matrix.image == 'api'
        run: docker run --rm --entrypoint /bin/sh saltedblog-preflight:api -c "! ldd /usr/local/bin/salted-api | grep -q 'not found'"
