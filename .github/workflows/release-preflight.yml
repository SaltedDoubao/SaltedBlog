name: release-preflight

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
        working-directory: api
      - run: cargo test --workspace --locked
        working-directory: api
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: deploy/Dockerfile.api
          - image: web
            dockerfile: deploy/Dockerfile.web
          - image: caddy
            dockerfile: deploy/Dockerfile.caddy
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          pull: true
          push: false
          load: ${{ matrix.image == 'api' }}
          tags: saltedblog-preflight:${{ matrix.image }}
          cache-from: type=gha,scope=preflight-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=preflight-${{ matrix.image }}
      - name: Verify API runtime libraries
        if: matrix.image == 'api'
        run: docker run --rm --entrypoint /bin/sh saltedblog-preflight:api -c "! ldd /usr/local/bin/salted-api | grep -q 'not found'"
