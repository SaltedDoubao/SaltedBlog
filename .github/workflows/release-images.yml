name: release-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate release tag and version
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must use vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME#v}" != "$(tr -d '[:space:]' < VERSION)" ]]; then
            echo "release tag does not match VERSION" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Check Rust formatting
        run: cargo fmt --check
        working-directory: api
      - name: Run strict Rust lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
        working-directory: api
      - name: Test Rust workspace
        run: cargo test --workspace --locked
        working-directory: api
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Check Astro types
        run: npm run check
        working-directory: web
      - name: Build Astro SSR application
        run: npm run build
        working-directory: web

  images:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: deploy/Dockerfile.api
          - image: web
            dockerfile: deploy/Dockerfile.web
          - image: caddy
            dockerfile: deploy/Dockerfile.caddy
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/salteddoubao/saltedblog-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/salteddoubao/saltedblog-${{ matrix.image }}:sha-${{ github.sha }}
            ghcr.io/salteddoubao/saltedblog-${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
