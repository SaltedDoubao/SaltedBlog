name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo test --workspace --locked
        working-directory: api
      - run: cargo audit
        working-directory: api
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm audit --omit=dev --audit-level=high
        working-directory: web
      - run: npm run build
        working-directory: web

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile.api -t salted-api:ci .
      - run: docker build -f deploy/Dockerfile.web -t salted-web:ci .
      - run: docker build -f deploy/Dockerfile.caddy -t salted-caddy:ci .
      - uses: anchore/sbom-action@v0
        with:
          image: salted-api:ci
          format: spdx-json
          output-file: salted-api.spdx.json
      - uses: anchore/sbom-action@v0
        with:
          image: salted-web:ci
          format: spdx-json
          output-file: salted-web.spdx.json
      - uses: anchore/sbom-action@v0
        with:
          image: salted-caddy:ci
          format: spdx-json
          output-file: salted-caddy.spdx.json
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: salted-api:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: salted-web:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: salted-caddy:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
